name: Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      # 动态替换 wrangler.toml 中的变量
      - name: Inject Variables into wrangler.toml
        run: |
          sed -i "s/REPLACE_WITH_D1_ID/${{ secrets.D1 }}/g" wrangler.toml
          sed -i "s/REPLACE_WITH_JWT_SECRET/${{ secrets.JWT_SECRET }}/g" wrangler.toml
          sed -i "s/REPLACE_WITH_WX_APPID/${{ secrets.WX_APPID }}/g" wrangler.toml
          sed -i "s/REPLACE_WITH_WX_APPSECRET/${{ secrets.WX_APPSECRET }}/g" wrangler.toml

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
